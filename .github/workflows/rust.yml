name: Rust

on:
  push:
    branches: ["main"]

env:
  CARGO_TERM_COLOR: always
  IMAGE: ghcr.io/jonasrichard/vector

jobs:
  build:
    name: Build (${{ matrix.platform }})
    runs-on: ubuntu-latest
    permissions:
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            platform: linux/amd64
            target: x86_64-unknown-linux-gnu
            suffix: amd64

    steps:
      - name: Checkout builder
        uses: actions/checkout@v7

      - name: Install protoc
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            cmake clang libclang-dev pkg-config \
            libssl-dev libsasl2-dev protobuf-compiler \
            perl make

      - name: Checkout vector
        uses: actions/checkout@v7
        with:
          repository: "jonasrichard/vector"
          ref: fix/stream-timeout
          token: ${{ github.token }}
          path: ./vector-repo

      - uses: Swatinem/rust-cache@v2

      - name: Build
        working-directory: ./vector-repo
        run: cargo build --release --no-default-features --features default-cmake --bin vector

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push per-arch image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: ${{ matrix.platform }}
          push: true
          tags: ${{ env.IMAGE }}:batch-fix-${{ matrix.suffix }}
