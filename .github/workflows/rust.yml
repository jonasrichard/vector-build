name: Rust

on:
  push:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - name: Checkout vector
      uses: actions/checkout@v7
      with:
        repository: 'jonasrichard/vector'
        ref: fix/stream-timeout
        token: ${{ github.token }}
        
    - name: Build
      run: cargo build --verbose
